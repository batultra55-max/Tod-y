<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TOD-Y - الواجهة الرئيسية</title><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><style>:root{--bg:#06090e;--cd:#111622;--ac:#00e676;--tx:#fff;--mu:#8b9bb4;--dg:#e61e50;--pr:#24314b}*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}body{background:var(--bg);color:var(--tx);overflow-x:hidden}.nb{display:flex;justify-content:space-between;align-items:center;padding:12px 4%;background:#0b0f17;border-bottom:1px solid #1a2233;position:sticky;top:0;z-index:100}.lg{font-size:22px;font-weight:900;cursor:pointer}.lg span{color:var(--ac)}.mb{font-size:24px;cursor:pointer}.mc{padding:15px 4%;max-width:1600px;margin:0 auto}.st{font-size:17px;margin:15px 0;display:flex;justify-content:space-between;align-items:center}.bb{font-size:12px;background:var(--pr);padding:4px 8px;border-radius:4px;cursor:pointer;color:var(--ac)}.gl{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}@media(min-width:768px){.gl{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}.fi{width:45px;height:32px;background:#ffe082;border-radius:0 4px 4px 4px;position:relative;margin:0 auto}.fi::before{content:'';width:18px;height:6px;background:inherit;border-radius:3px 3px 0 0;position:absolute;top:-6px;left:0}.si{background:#4caf50}.cd{background:var(--cd);border-radius:8px;overflow:hidden;border:1px solid #1a2233;transition:.15s;cursor:pointer;text-align:center;padding:12px 6px}.cd:hover{border-color:var(--ac);transform:translateY(-2px)}.cih{width:100%;height:50px;display:flex;align-items:center;justify-content:center}.ct{padding-top:8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(4,6,10,.85);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);padding:15px}.mdc{background:var(--cd);border:1px solid #24314b;padding:15px;border-radius:8px;width:100%;max-width:550px}input{width:100%;padding:8px;background:#0b0f17;border:1px solid #1a2233;border-radius:4px;color:#fff;margin-bottom:8px;font-size:13px}input:focus{border-color:var(--ac);outline:0}.btn{width:100%;padding:8px;border:0;border-radius:4px;font-weight:700;cursor:pointer;margin-bottom:4px;font-size:13px}.bp{background:var(--ac);color:#000}.bs{background:var(--pr);color:#fff}.ld-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:12px}.sp{width:36px;height:36px;border:3px solid #1a2233;border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body>
<div class="nb"><div class="lg" onclick="gH()">TOD-<span>Y</span></div><div class="mb" onclick="oM('aM')">☰</div></div>
<div class="mc" id="aC"><div class="ld-box"><div class="sp"></div><div style="font-size:14px;color:var(--mu)">جاري المزامنة</div></div></div>
<div class="md" id="aM"><div class="mdc"><h3 style="margin-bottom:8px;color:var(--ac)">الوضع الآمن</h3><input type="password" id="sC" placeholder="الرمز"><button class="btn bp" onclick="vC()">دخول</button><button class="btn bs" onclick="cM('aM')">إلغاء</button></div></div>
<script>
firebase.initializeApp({databaseURL:"https://yall-taoaqo3-default-rtdb.firebaseio.com/"});
const db=firebase.database(),$=id=>document.getElementById(id);
let gD={servers:{}},v="s",aCId=null,aSId=null;
window.onload=()=>{db.ref('tody_multi_stream_data').on('value',s=>{gD=s.val()?.servers?s.val():{servers:{}};rUI();},e=>{$('aC').innerHTML=`<div class="st" style="text-align:center;display:block">خطأ في جلب بيانات الشبكة.</div>`})};
const oM=id=>$(id).style.display='flex',cM=id=>$(id).style.display='none';
const vC=()=>{if($('sC').value==="V555"){alert("مرحباً بك! للاستخدام الإداري يرجى فتح ملف لوحة المطور المستقل.");cM('aM');$('sC').value="";}else alert("خطأ!");};
const gH=()=>{v="s";aSId=aCId=null;rUI();},gB=()=>{if(v==="c"){v="cat"}else if(v==="cat"){v="s";aSId=null}rUI();};

// دالة فتح مشغل الويب الفاخر في نافذة منبثقة مخصصة لمتصفح كروم فقط وبصمت تام
function openWebPlayer(url, name) {
    // التحقق الصارم من أن المتصفح الحالي هو Google Chrome وتجنب المتصفحات الأخرى بصمت
    const isChrome = /Chrome/i.test(navigator.userAgent) && /Google Inc/i.test(navigator.vendor);
    if (!isChrome) return; 

    let streamType = "application/x-mpegURL";
    
    // تصميم واجهة مشغل سينمائية فائقة الجمال وبدون أي عناصر مشوشة
    let playerHTML = `
        <!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>${name} - بث مباشر</title>
            <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
            <script src="https://vjs.zencdn.net/8.10.0/video.min.js"><\/script>
            <style>
                body, html { margin:0; padding:0; width:100%; height:100%; background:#06090e; font-family:sans-serif; overflow:hidden; display:flex; flex-direction:column; }
                .top-bar { background:#0b0f17; padding:10px 15px; color:#00e676; font-size:13px; font-weight:bold; border-bottom:1px solid #1a2233; display:flex; justify-content:space-between; align-items:center; }
                .p-wrap { flex:1; width:100%; background:#000; position:relative; }
                .video-js { width:100%!important; height:100%!important; background-color:#000; }
                /* تصميم زر التشغيل المركزي بشكل دائري نيون جذاب وثابت */
                .vjs-big-play-button { background-color:rgba(0,230,118,.85)!important; border:2px solid #00e676!important; top:50%!important; left:50%!important; transform:translate(-50%,-50%)!important; width:65px!important; height:65px!important; border-radius:50%!important; line-height:62px!important; box-shadow:0 0 15px rgba(0,230,118,0.4)!important; }
                .vjs-big-play-button:hover { background-color:#00e676!important; box-shadow:0 0 25px rgba(0,230,118,0.7)!important; }
                .vjs-control-bar { background:rgba(11,15,23,0.85)!important; backdrop-filter:blur(5px); }
            </style>
        </head>
        <body>
            <div class="top-bar">
                <div>📺 قناة: ${name}</div>
                <div style="color:#8b9bb4; font-size:11px; font-weight:normal;">TOD-Y Player Premium</div>
            </div>
            <div class="p-wrap">
                <video id="stPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto"></video>
            </div>
            <script>
                // تهيئة وضبط الـ VHS لتوفير أعلى قدرة Buffer وسلاسة تشغيل
                var player = videojs('stPlayer', {
                    liveui: true,
                    autoplay: true,
                    responsive: true,
                    fluid: false,
                    html5: {
                        vhs: {
                            overrideNative: true,
                            maxBufferLength: 40, // كاش مسبق مكثف لـ 40 ثانية لمنع التجمد تماماً
                            maxMaxBufferLength: 80,
                            enableLowInitialPlaylist: true,
                            smoothQualityChange: true
                        }
                    }
                });
                player.src({ src: "${url}", type: "${streamType}" });
                player.ready(function(){
                    player.play().catch(function(e){ console.log("Autoplay context handled"); });
                });
            <\/script>
        </body>
        </html>
    `;

    // حساب الأبعاد والتموضع الفوري لجعل النافذة المنبثقة تظهر في منتصف الشاشة بدقة هندسية مريحة
    let w = 840, h = 500;
    let left = (screen.width/2)-(w/2), top = (screen.height/2)-(h/2);
    
    // فتح النافذة المنبثقة المستقلة (Pop-up Window)
    let pWin = window.open("about:blank", "_blank", `width=${w},height=${h},top=${top},left=${left},scrollbars=no,menubar=no,status=no,toolbar=no,location=no,resizable=yes`);
    
    if(pWin) {
        pWin.document.write(playerHTML);
        pWin.document.close();
    }
}

function rUI(){let c=$('aC');c.innerHTML="";let hD=!1;if(v==="s"){c.innerHTML=`<div class="st">سيرفرات Xtream المتاحة</div>`;let g=document.createElement('div');g.className='gl';for(let i in gD.servers){let s=gD.servers[i];if(s.visible===!1)continue;hD=!0;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aSId=i;v="cat";rUI()};d.innerHTML=`<div class="cih"><div class="fi si"></div></div><div class="ct">${s.name||s.user}</div>`;g.appendChild(d)}c.appendChild(g);if(!hD)c.innerHTML=`<div class="st" style="display:block;text-align:center">لا توجد سيرفرات مضافة حالياً.</div>`}else if(v==="cat"){let s=gD.servers[aSId];if(!s||s.visible===!1)return gB();c.innerHTML=`<div class="st"><span>${s.name||s.user} 📁 المجلدات</span><span class="bb" onclick="gB()">عودة</span></div>`;let g=document.createElement('div');g.className='gl';for(let i in s.categories){let cat=s.categories[i];if(cat.visible===!1)continue;let cnt=s.channels.filter(ch=>ch.catId==i&&ch.visible!==!1).length;if(cnt===0)continue;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aCId=i;v="c";rUI()};d.innerHTML=`<div class="cih"><div class="fi"></div></div><div class="ct">${cat.name}<br><span style="color:var(--mu);font-size:10px">${cnt} قناة</span></div>`;g.appendChild(d)}c.appendChild(g)}else if(v==="c"){let s=gD.servers[aSId];if(!s||s.visible===!1||!s.categories[aCId])return gB();c.innerHTML=`<div class="st"><span>${s.categories[aCId].name}</span><span class="bb" onclick="gB()">عودة</span></div>`;let g=document.createElement('div');g.className='gl';s.channels.filter(ch=>ch.catId==aCId&&ch.visible!==!1).forEach(ch=>{let d=document.createElement('div');d.className='cd';d.onclick=()=>{let u=ch.url;/Android/i.test(navigator.userAgent)?window.location.href=`intent://${u.replace(/https?:\/\//,"")}#Intent;scheme=http;package=org.videolan.vlc;type=video/*;S.title=${encodeURIComponent(ch.name)};i.network-caching=10000;i.clock-jitter=0;B.prefer-hw-decoding=true;end`:openWebPlayer(u, ch.name);};let img=ch.icon.startsWith('http')?`<img src="${ch.icon}" style="width:100%;height:50px;object-fit:contain">`:`<div style="font-size:11px;color:var(--ac);padding:10px 0">بث</div>`; d.innerHTML=`<div class="cih">${img}</div><div class="ct">${ch.name}</div>`;g.appendChild(d)});c.appendChild(g)}}
</script>
</body></html>
