<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TOD-Y</title><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><style>:root{--bg:#06090e;--cd:#111622;--ac:#00e676;--tx:#fff;--mu:#8b9bb4;--dg:#e61e50;--pr:#24314b}*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}body{background:var(--bg);color:var(--tx);overflow-x:hidden}.nb{display:flex;justify-content:space-between;align-items:center;padding:12px 4%;background:#0b0f17;border-bottom:1px solid #1a2233;position:sticky;top:0;z-index:100}.lg{font-size:22px;font-weight:900;cursor:pointer}.lg span{color:var(--ac)}.mb{font-size:24px;cursor:pointer}.mc{padding:15px 4%;max-width:1600px;margin:0 auto}.st{font-size:17px;margin:15px 0;display:flex;justify-content:space-between;align-items:center}.bb{font-size:12px;background:var(--pr);padding:4px 8px;border-radius:4px;cursor:pointer;color:var(--ac)}.gl{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}@media(min-width:768px){.gl{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}.fi{width:45px;height:32px;background:#ffe082;border-radius:0 4px 4px 4px;position:relative;margin:0 auto}.fi::before{content:'';width:18px;height:6px;background:inherit;border-radius:3px 3px 0 0;position:absolute;top:-6px;left:0}.si{background:#4caf50}.cd{background:var(--cd);border-radius:8px;overflow:hidden;border:1px solid #1a2233;transition:.15s;cursor:pointer;text-align:center;padding:12px 6px}.cd:hover{border-color:var(--ac);transform:translateY(-2px)}.cih{width:100%;height:50px;display:flex;align-items:center;justify-content:center}.ct{padding-top:8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(4,6,10,.85);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);padding:15px}.mdc{background:var(--cd);border:1px solid #24314b;padding:15px;border-radius:8px;width:100%;max-width:550px}.mds{max-width:650px}input{width:100%;padding:8px;background:#0b0f17;border:1px solid #1a2233;border-radius:4px;color:#fff;margin-bottom:8px;font-size:13px}input:focus{border-color:var(--ac);outline:0}.btn{width:100%;padding:8px;border:0;border-radius:4px;font-weight:700;cursor:pointer;margin-bottom:4px;font-size:13px}.bp{background:var(--ac);color:#000}.bs{background:var(--pr);color:#fff}.ib{background:#0b0f17;border:1px dashed var(--ac);padding:8px;border-radius:4px;margin:6px 0;font-size:11px;color:var(--mu)}.dl{max-height:250px;overflow-y:auto;background:#0b0f17;padding:4px;border-radius:4px;border:1px solid #1a2233;margin-top:5px}.di{display:flex;flex-direction:column;border-bottom:1px solid #1a2233;padding:6px 0}.dim{display:flex;align-items:center;justify-content:space-between;font-size:11px;width:100%}.ei{width:120px;padding:3px;background:#1a2233;border:1px solid #24314b;font-size:11px;color:#fff}.smb{padding:3px 6px;font-size:10px;border-radius:3px;border:0;cursor:pointer;color:#fff;font-weight:700}.cm{display:none;background:#070a0f;padding:6px;margin-top:4px;border-radius:4px;border:1px solid #24314b;max-height:150px;overflow-y:auto}.tbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px}.tbl th,.tbl td{border:1px solid #1a2233;padding:6px;text-align:center}.tbl th{background:#0b0f17;color:var(--mu)}.ld-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:12px}.sp{width:36px;height:36px;border:3px solid #1a2233;border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}/* تصميم نافذة المشغل الداخلي المطور للويندوز */.vp-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000;justify-content:center;align-items:center;padding:10px}.vp-card{background:#000;width:100%;max-width:850px;border-radius:12px;border:1px solid #1a2233;overflow:hidden;position:relative}.vp-header{background:#0b0f17;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a2233}.vp-title{font-size:14px;font-weight:bold;color:var(--ac);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%}.vp-close{background:var(--dg);color:#fff;border:0;padding:4px 10px;font-size:11px;font-weight:bold;border-radius:4px;cursor:pointer}video{width:100%;height:auto;aspect-ratio:16/9;background:#000;display:block}</style></head>
<body>
<div class="nb"><div class="lg" onclick="gH()">TOD-<span>Y</span></div><div class="mb" onclick="oM('aM')">☰</div></div>
<div class="mc" id="aC"><div class="ld-box"><div class="sp"></div><div style="font-size:14px;color:var(--mu)">جاري المزامنة</div></div></div>
<div class="md" id="aM"><div class="mdc"><h3 style="margin-bottom:8px;color:var(--ac)">الوضع الآمن</h3><input type="password" id="sC" placeholder="الرمز"><button class="btn bp" onclick="vC()">دخول</button><button class="btn bs" onclick="cM('aM')">إلغاء</button></div></div>
<div class="md" id="dM"><div class="mdc mds"><h3 style="margin-bottom:8px;color:var(--ac)">لوحة المطور الإحترافية</h3><div style="display:flex;gap:6px"><input type="text" id="xH" placeholder="Host"><input type="text" id="xU" placeholder="User"><input type="text" id="xP" placeholder="Pass"></div><button class="btn bp" onclick="fX()">إضافة سيرفر جديد</button>
<div style="margin-top:12px"><h5 style="color:var(--mu);margin-bottom:4px">السيرفرات المضافة:</h5><div id="dSL"></div></div><button class="btn bs" onclick="cM('dM')" style="margin-top:12px">إغلاق</button></div></div>
<div class="md" id="sMM"><div class="mdc mds"><h3 id="sMMT" style="margin-bottom:4px;color:var(--ac)">إدارة السيرفر</h3><div style="margin-bottom:8px;display:flex;gap:6px;align-items:center"><span style="font-size:11px;color:var(--mu)">اسم العرض:</span><input type="text" id="sMNE" style="margin:0;flex:1" onchange="uSN()"><button class="smb bp" onclick="uSN()">حفظ الاسم</button></div><div style="display:flex;gap:6px;margin-bottom:6px;align-items:center"><label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" onchange="tSA(this)"> تحديد الكل</label><button class="smb" style="background:var(--dg)" onclick="bA('d')">حذف المجلدات</button><button class="smb" style="background:var(--pr);color:var(--ac)" onclick="bA('h')">إخفاء</button><button class="smb" style="background:#0d47a1" onclick="bA('s')">إظهار</button></div><div class="dl" id="sMMC"></div><button class="btn bs" onclick="cM('sMM')" style="margin-top:12px">عودة للوحة الرئيسية</button></div></div>

<div class="vp-modal" id="vMo"><div class="vp-card"><div class="vp-header"><div class="vp-title" id="vTi">اسم القناة</div><button class="vp-close" onclick="cVP()">إغلاق المشغل ×</button></div><video id="vPl" controls autoplay playsinline></video></div></div>

<script>
firebase.initializeApp({databaseURL:"https://yall-taoaqo3-default-rtdb.firebaseio.com/"});
const db=firebase.database(),$=id=>document.getElementById(id);
let gD={servers:{}},v="s",aCId=null,aSId=null,eSId=null,hls=null;
window.onload=()=>{db.ref('tody_multi_stream_data').on('value',s=>{gD=s.val()?.servers?s.val():{servers:{}};rUI();if($('dM').style.display==='flex')rDL();if($('sMM').style.display==='flex')oSM(eSId);},e=>{$('aC').innerHTML=`<div class="st" style="text-align:center;display:block">خطأ شبكة.</div>`})};
const oM=id=>$(id).style.display='flex',cM=id=>$(id).style.display='none';
const vC=()=>{if($('sC').value==="V555"){cM('aM');$('sC').value="";oM('dM');rDL();}else alert("خطأ!");};
async function fX(){let h=$('xH').value.trim(),u=$('xU').value.trim(),p=$('xP').value.trim();if(!h||!u||!p)return alert("املاً الحقول!");try{let[cR,chR]=await Promise.all([fetch(`${h}/player_api.php?username=${u}&password=${p}&action=get_live_categories`).then(r=>r.json()),fetch(`${h}/player_api.php?username=${u}&password=${p}&action=get_live_streams`).then(r=>r.json())]),id="s_"+Date.now(),cats={};cR.forEach(c=>{cats[c.category_id]={name:c.category_name,visible:!0}});let chs=chR.map(c=>({id:c.stream_id,name:c.name,catId:c.category_id,icon:c.stream_icon||'',url:`${h}/live/${u}/${p}/${c.stream_id}.m3u8`,visible:!0}));gD.servers[id]={id,name:u,host:h,user:u,pass:p,visible:!0,categories:cats,channels:chs};db.ref('tody_multi_stream_data').set(gD);alert("تم!");rDL();}catch(e){alert("فشل!");}}
const gH=()=>{v="s";aSId=aCId=null;rUI();},gB=()=>{if(v==="c"){v="cat"}else if(v==="cat"){v="s";aSId=null}rUI();};
function rUI(){let c=$('aC');c.innerHTML="";let hD=!1;if(v==="s"){c.innerHTML=`<div class="st">سيرفرات Xtream المتاحة</div>`;let g=document.createElement('div');g.className='gl';for(let i in gD.servers){let s=gD.servers[i];if(s.visible===!1)continue;hD=!0;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aSId=i;v="cat";rUI()};d.innerHTML=`<div class="cih"><div class="fi si"></div></div><div class="ct">${s.name||s.user}</div>`;g.appendChild(d)}c.appendChild(g);if(!hD)c.innerHTML=`<div class="st" style="display:block;text-align:center">لا توجد سيرفرات مضافة.</div>`}else if(v==="cat"){let s=gD.servers[aSId];if(!s||s.visible===!1)return gB();c.innerHTML=`<div class="st"><span>${s.name||s.user} 📁 المجلدات</span><span class="bb" onclick="gB()">عودة</span></div>`;let g=document.createElement('div');g.className='gl';for(let i in s.categories){let cat=s.categories[i];if(cat.visible===!1)continue;let cnt=s.channels.filter(ch=>ch.catId==i&&ch.visible!==!1).length;if(cnt===0)continue;let d=document.createElement('div');d.className='cd';d.onclick=()=>{aCId=i;v="c";rUI()};d.innerHTML=`<div class="cih"><div class="fi"></div></div><div class="ct">${cat.name}<br><span style="color:var(--mu);font-size:10px">${cnt} قناة</span></div>`;g.appendChild(d)}c.appendChild(g)}else if(v==="c"){let s=gD.servers[aSId];if(!s||s.visible===!1||!s.categories[aCId])return gB();c.innerHTML=`<div class="st"><span>${s.categories[aCId].name}</span><span class="bb" onclick="gB()">عودة</span></div>`;let g=document.createElement('div');g.className='gl';s.channels.filter(ch=>ch.catId==aCId&&ch.visible!==!1).forEach(ch=>{let d=document.createElement('div');d.className='cd';d.onclick=()=>{let u=ch.url;if(/Android/i.test(navigator.userAgent)){window.location.href=`intent://${u.replace(/https?:\/\//,"")}#Intent;scheme=http;package=org.videolan.vlc;type=video/*;S.title=TOD-Y;i.network-caching=10000;i.clock-jitter=0;B.prefer-hw-decoding=true;end`;}else{oVP(ch.name,u);}};let img=ch.icon.startsWith('http')?`<img src="${ch.icon}" style="width:100%;height:50px;object-fit:contain">`:`<div style="font-size:11px;color:var(--ac);padding:10px 0">بث</div>`;d.innerHTML=`<div class="cih">${img}</div><div class="ct">${ch.name}</div>`;g.appendChild(d)});c.appendChild(g)}}
function rDL(){let c=$('dSL');c.innerHTML=`<table class="tbl"><thead><tr><th>اسم العرض</th><th>الحالة</th><th>الرابط</th><th>التحكم</th></tr></thead><tbody id="tBd"></tbody></table>`;let b=$('tBd');for(let i in gD.servers){let s=gD.servers[i],tr=document.createElement('tr');let sSt=s.visible!==!1?`<span style="color:var(--ac)">ظاهر</span>`:`<span style="color:var(--mu)">مخفي</span>`;tr.innerHTML=`<td><b>${s.name||s.user}</b></td><td>${sSt}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.host}</td><td><button class="smb bp" onclick="tSV('${i}')">عين الحالة</button> <button class="smb bs" style="background:#0d47a1" onclick="oSM('${i}')">إدارة ⚙️</button> <button class="smb" style="background:var(--dg)" onclick="dFS('${i}')">حذف</button></td>`; b.appendChild(tr)}}
const tSV=s=>{gD.servers[s].visible=gD.servers[s].visible!==!1?!1:!0;db.ref('tody_multi_stream_data').set(gD);rDL();};
function oSM(id){eSId=id;let s=gD.servers[id];if(!s)return;$('sMMT').innerText=`إدارة: ${s.name||s.user}`;$('sMNE').value=s.name||s.user;let c=$('sMMC');c.innerHTML="";for(let j in s.categories){let cat=s.categories[j],it=document.createElement('div');it.className='di';let st=cat.visible!==!1?`<span style="color:var(--ac)">ظاهر</span>`:`<span style="color:var(--mu)">مخفي</span>`;it.innerHTML=`<div class="dim"><div><input type="checkbox" class="cc" data-c="${j}"> <input type="text" class="ei" value="${cat.name}" onchange="uCN('${j}',this.value)"></div><div>${st} <button class="smb bs" onclick="tCV('${j}')">عين</button> <button class="smb bp" onclick="tCM('${j}')">✎ القنوات</button></div></div><div class="cm" id="chm-${j}"></div>`;c.appendChild(it)}oM('sMM');}
const uSN=()=>{let v=$('sMNE').value.trim();if(v&&eSId){gD.servers[eSId].name=v;db.ref('tody_multi_stream_data').set(gD);alert("تم تعديل الاسم!");}}
const uCN=(c,v)=>{if(v.trim()&&eSId){gD.servers[eSId].categories[c].name=v.trim();db.ref('tody_multi_stream_data').set(gD)}};
const tCV=(c)=>{if(eSId){gD.servers[eSId].categories[c].visible=gD.servers[eSId].categories[c].visible===!1;db.ref('tody_multi_stream_data').set(gD)}};
const dFS=s=>{if(confirm("حذف السيرفر نهائياً؟")){delete gD.servers[s];db.ref('tody_multi_stream_data').set(gD);gH()}};
const tSA=m=>document.querySelectorAll('.cc').forEach(c=>c.checked=m.checked);
const bA=t=>{let k=document.querySelectorAll('.cc:checked');if(!k.length||!eSId)return;if(t==='d'&&!confirm("حذف المجلدات المحددة؟"))return;k.forEach(b=>{let c=b.getAttribute('data-c');if(gD.servers[eSId].categories[c]){if(t==='d'){delete gD.servers[eSId].categories[c];gD.servers[eSId].channels=gD.servers[eSId].channels.filter(x=>x.catId!=c)}else gD.servers[eSId].categories[c].visible=(t==='s')}});db.ref('tody_multi_stream_data').set(gD);if(t==='d')gH()};
const tCM=(c)=>{let b=$(`chm-${c}`);if(b.style.display==='block'){b.style.display='none';return}b.style.display='block';b.innerHTML='...';rCH(c);};
const rCH=(c)=>{let b=$(`chm-${c}`);let ch=gD.servers[eSId].channels.filter(x=>x.catId==c);if(!ch.length){b.innerHTML='فارغ';return}let h=`<button class="smb" style="background:var(--dg);width:100%;margin-bottom:5px" onclick="dSC('${c}')">حذف القنوات المحددة</button>`;ch.forEach(x=>{let chSt=x.visible!==!1?`<span style="color:var(--ac)">ظاهرة</span>`:`<span style="color:var(--mu)">مخفية</span>`;h+=`<div style="display:flex;align-items:center;justify-content:between;gap:4px;font-size:10px;margin-bottom:3px;background:#111622;padding:2px;border-radius:3px"><div style="display:flex;align-items:center;gap:4px;flex:1"><input type="checkbox" class="cdc" data-i="${x.id}"><span>${x.name}</span></div><div style="display:flex;align-items:center;gap:4px">${chSt}<button class="smb bs" style="padding:1px 4px;font-size:9px" onclick="tChV('${c}','${x.id}')">عين</button></div></div>`});b.innerHTML=h};
const tChV=(c,chId)=>{if(eSId){let idx=gD.servers[eSId].channels.findIndex(x=>x.id==chId);if(idx!==-1){gD.servers[eSId].channels[idx].visible=gD.servers[eSId].channels[idx].visible===!1;db.ref('tody_multi_stream_data').set(gD).then(()=>{rCH(c);})}}};
const dSC=(c)=>{let k=document.querySelectorAll(`#chm-${c} .cdc:checked`);if(!k.length||!confirm("حذف القنوات؟")||!eSId)return;let id=Array.from(k).map(b=>b.getAttribute('data-i'));gD.servers[eSId].channels=gD.servers[eSId].channels.filter(x=>!id.includes(String(x.id)));db.ref('tody_multi_stream_data').set(gD).then(()=>{rCH(c);})};

// دوال تشغيل المشغل المدمج الاحترافي للويندوز
function oVP(name, url){$('vTi').innerText=name;$('vMo').style.display='flex';const v=$('vPl');if(hls){hls.destroy();}if(Hls.isSupported()){hls=new Hls({maxBufferLength:10,maxMaxBufferLength:20,enableWorker:true});hls.loadSource(url);hls.attachMedia(v);hls.on(Hls.Events.ERROR,function(event,data){if(data.fatal){switch(data.type){case Hls.ErrorTypes.NETWORKError:hls.startLoad();break;case Hls.ErrorTypes.MEDIAError:hls.recoverMediaError();break;default:cVP();alert("عذراً، تعذر تشغيل البث بسبب قيود الحماية CORS بالسيرفر.");break;}}});}else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=url;}else{alert("متصفحك لا يدعم مشغلات البث المباشر المتقدمة.");}}
function cVP(){$('vMo').style.display='none';const v=$('vPl');v.pause();v.src="";if(hls){hls.destroy();hls=null;}}
</script>
</body></html>
